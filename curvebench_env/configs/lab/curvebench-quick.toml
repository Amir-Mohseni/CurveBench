# CurveBench Quick Training Configuration
# Fast training run for testing/debugging

model = "Qwen/Qwen3-VL-4B-Instruct"
max_steps = 200
batch_size = 128
rollouts_per_example = 8
env_files = [".env"]  # Load API keys from .env file

[sampling]
max_tokens = 4096

# Start with easiest level only
[[env]]
id = "amirmohseni/curvebench-env"
args = { split = "level_1_train" }

[wandb]
project = "curvebench"
name = "qwen3-4b-curvebench-lvl1"
entity = "rl-research-team"

[eval]
interval = 10
num_examples = -1  # Use all examples from validation and test
rollouts_per_example = 8
eval_base_model = true

[[eval.env]]
id = "amirmohseni/curvebench-env"
args = { split = "level_1_validation" }
