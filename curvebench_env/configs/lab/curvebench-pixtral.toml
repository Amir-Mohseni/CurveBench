# CurveBench Quick Training - Pixtral Model
# Fast training run using Pixtral vision model

model = "mistralai/Pixtral-12B-2409"
max_steps = 50
batch_size = 32
rollouts_per_example = 8
env_files = [".env"]  # Load API keys from .env file

[sampling]
max_tokens = 512

# Start with easiest level only
[[env]]
id = "amirmohseni/curvebench-env"
args = { split = "level_1_train" }

[wandb]
project = "curvebench"
name = "pixtral-12b-curvebench-quick"
entity = "rl-research-team"

[eval]
interval = 25
num_examples = 18  # Just level 1 test set
rollouts_per_example = 1
eval_base_model = true

[[eval.env]]
id = "amirmohseni/curvebench-env"
args = { split = "level_1_test" }

[val]
num_examples = 18
rollouts_per_example = 1
interval = 10
